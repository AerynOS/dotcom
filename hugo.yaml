baseURL: https://aerynos.com/
languageCode: en-us
title: AerynOS
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - name: About
      pageRef: /about
      weight: 1
    - name: Download
      pageRef: /download
      weight: 2
    - identifier: Documentation
      name: Docs
      pageRef: /docs
      weight: 3
    - identifier: Blog
      name: Blog
      pageRef: /blog
      weight: 4
    - identifier: menu
      name: More
      weight: 5
    - identifier: Funding
      name: Funding
      pageRef: /funding
      parent: menu
      weight: 1
    - identifier: Community
      name: Community
      pageRef: /community
      parent: menu
      weight: 2
    - identifier: Forums
      name: Forums
      url: "https://github.com/orgs/AerynOS/discussions"
      parent: menu
      weight: 3
    - identifier: glossary
      name: Glossary
      pageRef: /glossary
      parent: menu
      weight: 4
    - identifier: search
      name: Search
      weight: 6
      params:
        type: search
    - name: GitHub
      weight: 7
      url: "https://github.com/AerynOS/"
      params:
        icon: github
    - name: Zulip
      weight: 8
      url: "https://aerynos.zulipchat.com/"
      params:
        icon: zulip
    - name: Mastodon
      weight: 9
      url: "https://hachyderm.io/@AerynOS"
      params:
        icon: mastodon
    - name: Bluesky
      weight: 10
      url: "https://bsky.app/profile/aerynos.com"
      params:
        icon: bluesky
    - name: reddit
      weight: 11
      url: "https://www.reddit.com/r/AerynOS/"
      params:
        icon: reddit
    - name: Theme Toggle
      weight: 12
      params:
        type: theme-toggle

outputs:
  home: [html, llms]
  page: [html]
  section: [html, rss]

outputFormats:
  llms:
    name: llms
    baseName: llms
    mediaType: text/plain
    isPlainText: true

params:
  externalLinkDecoration: true
  enableInlineShortcodes: true
  # Display the last modification date
  displayUpdatedDate: true
  dateFormat: "January 2, 2006"
  navbar:
    displayTitle: true
    displayLogo: true
    width: wide
    logo:
      path: images/logo.svg
      link: /
      width: 40
      height: 40
  footer:
    width: wide
    displayCopyright: true
    displayPoweredBy: true

  theme:
    # light | dark | system
    default: system
    displayToggle: false
  page:
    # full (100%), wide (90rem), normal (1280px)
    width: wide
  banner:
    key: "announcement-donation"
    message: |
      Curious how to support AerynOS? Consider [donating](/funding) to the project
  # Search
  search:
    enable: true
    type: flexsearch
    flexsearch:
      # index page by: content | summary | heading | title
      index: content
      tokenize: full

# Parse Git commit
enableGitInfo: true
